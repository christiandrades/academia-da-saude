spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/academia_saude
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

jwt:
  secret: ${JWT_SECRET:academia-saude-secret-key-minimo-256-bits-change-in-production}
  expiration: 86400000

server:
  port: 8080